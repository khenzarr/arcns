specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ArcNSController
    network: arc-testnet
    source:
      address: "0x1bd377A2762510c00dd0ec2142E42829e7053C80"
      abi: ArcNSController
      startBlock: 38332349
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Upgraded
      abis:
        - name: ArcNSController
          file: ./abis/ArcNSController.json
      eventHandlers:
        - event: Upgraded(indexed address)
          handler: handleUpgraded
      file: ./src/arc-ns-controller.ts
