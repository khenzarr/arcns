type Domain @entity(immutable: false) {
  id: ID!
  name: String!
  owner: Bytes!
  resolver: Bytes
  label: Bytes
  tld: String
  registeredAt: BigInt
  expiresAt: BigInt
  cost: BigInt
  reverseName: String
  addrRecord: ResolverRecord
}

type Registration @entity(immutable: true) {
  id: ID!
  label: String!
  owner: Bytes!
  cost: BigInt!
  expires: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
}

type ResolverRecord @entity(immutable: false) {
  id: ID!
  node: Bytes!
  address: Bytes!
  blockNumber: BigInt!
  timestamp: BigInt!
}
