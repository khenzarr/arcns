specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # ── Arc Controller ──────────────────────────────────────────────────────────
  # v3 live address — deployed 2026-04-24T21:58:41Z, block 38856377
  - kind: ethereum
    name: ArcController
    network: arc-testnet
    source:
      address: "0xe0A67F2E74Bcb740F0446fF2aCF32081DB877D46"
      abi: Controller
      startBlock: 38856377
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Domain
        - Registration
        - Renewal
        - Account
        - DomainEvent
      abis:
        - name: Controller
          file: ./abis/ArcNSRegistrarControllerV2.json
      eventHandlers:
        - event: NameRegistered(string,indexed bytes32,indexed address,uint256,uint256)
          handler: handleArcNameRegistered
        - event: NameRenewed(string,indexed bytes32,uint256,uint256)
          handler: handleArcNameRenewed
      file: ./src/controller.ts

  # ── Circle Controller ───────────────────────────────────────────────────────
  # v3 live address — deployed 2026-04-24T21:58:41Z, block 38856377
  - kind: ethereum
    name: CircleController
    network: arc-testnet
    source:
      address: "0x4CB0650847459d9BbDd5823cc6D320C900D883dA"
      abi: Controller
      startBlock: 38856377
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Domain
        - Registration
        - Renewal
        - Account
        - DomainEvent
      abis:
        - name: Controller
          file: ./abis/ArcNSRegistrarControllerV2.json
      eventHandlers:
        - event: NameRegistered(string,indexed bytes32,indexed address,uint256,uint256)
          handler: handleCircleNameRegistered
        - event: NameRenewed(string,indexed bytes32,uint256,uint256)
          handler: handleCircleNameRenewed
      file: ./src/controller.ts

  # ── Arc BaseRegistrar (ERC-721 ownership) ───────────────────────────────────
  # v3 live address — deployed 2026-04-24T21:58:41Z, block 38856377
  - kind: ethereum
    name: ArcRegistrar
    network: arc-testnet
    source:
      address: "0xD600B8D80e921ec48845fC1769c292601e5e90C4"
      abi: BaseRegistrar
      startBlock: 38856377
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Domain
        - Account
        - DomainEvent
      abis:
        - name: BaseRegistrar
          file: ./abis/ArcNSBaseRegistrar.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleArcTransfer
      file: ./src/registrar.ts

  # ── Circle BaseRegistrar (ERC-721 ownership) ────────────────────────────────
  # v3 live address — deployed 2026-04-24T21:58:41Z, block 38856377
  - kind: ethereum
    name: CircleRegistrar
    network: arc-testnet
    source:
      address: "0xE1fdE46df4bAC6F433C52a337F4818822735Bf8a"
      abi: BaseRegistrar
      startBlock: 38856377
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Domain
        - Account
        - DomainEvent
      abis:
        - name: BaseRegistrar
          file: ./abis/ArcNSBaseRegistrar.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleCircleTransfer
      file: ./src/registrar.ts

  # ── Resolver ────────────────────────────────────────────────────────────────
  # v3 live address — deployed 2026-04-24T21:58:41Z, block 38856377
  - kind: ethereum
    name: Resolver
    network: arc-testnet
    source:
      address: "0x4c3a2D4245346732CE498937fEAD6343e77Eb097"
      abi: Resolver
      startBlock: 38856377
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Domain
        - ResolverRecord
      abis:
        - name: Resolver
          file: ./abis/ArcNSResolverV2.json
      eventHandlers:
        - event: AddrChanged(indexed bytes32,address)
          handler: handleAddrChanged
        - event: NameChanged(indexed bytes32,string)
          handler: handleNameChanged
      file: ./src/resolver.ts

  # ── Registry ────────────────────────────────────────────────────────────────
  # v3 live address — deployed 2026-04-24T21:58:41Z, block 38856377
  - kind: ethereum
    name: Registry
    network: arc-testnet
    source:
      address: "0xc20B3F8C7A7B4FcbFfe35c6C63331a1D9D12fD1A"
      abi: Registry
      startBlock: 38856377
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Domain
        - DomainEvent
      abis:
        - name: Registry
          file: ./abis/ArcNSRegistry.json
      eventHandlers:
        - event: Transfer(indexed bytes32,address)
          handler: handleTransfer
        - event: NewResolver(indexed bytes32,address)
          handler: handleNewResolver
      file: ./src/registry.ts

  # ── Reverse Registrar ───────────────────────────────────────────────────────
  # v3 live address — deployed 2026-04-24T21:58:41Z, block 38856377
  - kind: ethereum
