specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  # ── Arc Controller ──────────────────────────────────────────────────────────
  - kind: ethereum
    name: ArcController
    network: arc-testnet
    source:
      address: "0x1bd377A2762510c00dd0ec2142E42829e7053C80"
      abi: Controller
      startBlock: 38332349
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Domain
        - Registration
      abis:
        - name: Controller
          file: ./abis/ArcNSRegistrarControllerV2.json
      eventHandlers:
        - event: NameRegistered(string,indexed bytes32,indexed address,uint256,uint256)
          handler: handleArcNameRegistered
        - event: NameRenewed(string,indexed bytes32,uint256,uint256)
          handler: handleArcNameRenewed
      file: ./src/controller.ts

  # ── Circle Controller ───────────────────────────────────────────────────────
  - kind: ethereum
    name: CircleController
    network: arc-testnet
    source:
      address: "0xfBFE553633AB91b6B32A0E6296341000Bf03DB95"
      abi: Controller
      startBlock: 38332349
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Domain
        - Registration
      abis:
        - name: Controller
          file: ./abis/ArcNSRegistrarControllerV2.json
      eventHandlers:
        - event: NameRegistered(string,indexed bytes32,indexed address,uint256,uint256)
          handler: handleCircleNameRegistered
        - event: NameRenewed(string,indexed bytes32,uint256,uint256)
          handler: handleCircleNameRenewed
      file: ./src/controller.ts

  # ── Arc Registrar ───────────────────────────────────────────────────────────
  - kind: ethereum
    name: ArcRegistrar
    network: arc-testnet
    source:
      address: "0xb156d9726661E92C541e3a267ee8710Fdcd24969"
      abi: BaseRegistrar
      startBlock: 38332349
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Domain
      abis:
        - name: BaseRegistrar
          file: ./abis/ArcNSBaseRegistrar.json
      eventHandlers:
        - event: NameRegistered(indexed uint256,indexed address,uint256)
          handler: handleArcRegistrarNameRegistered
        - event: NameRenewed(indexed uint256,uint256)
          handler: handleArcRegistrarNameRenewed
      file: ./src/registrar.ts

  # ── Circle Registrar ────────────────────────────────────────────────────────
  - kind: ethereum
    name: CircleRegistrar
    network: arc-testnet
    source:
      address: "0xBdfF2790Dd72E86C3510Cc8374EaC5E2E0659c5e"
      abi: BaseRegistrar
      startBlock: 38332349
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Domain
      abis:
        - name: BaseRegistrar
          file: ./abis/ArcNSBaseRegistrar.json
      eventHandlers:
        - event: NameRegistered(indexed uint256,indexed address,uint256)
          handler: handleCircleRegistrarNameRegistered
        - event: NameRenewed(indexed uint256,uint256)
          handler: handleCircleRegistrarNameRenewed
      file: ./src/registrar.ts

  # ── Resolver ────────────────────────────────────────────────────────────────
  - kind: ethereum
    name: Resolver
    network: arc-testnet
    source:
      address: "0xE62De42eAcb270D2f2465c017C30bbf24F3f9350"
      abi: Resolver
      startBlock: 38332349
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Domain
        - ResolverRecord
      abis:
        - name: Resolver
          file: ./abis/ArcNSResolverV2.json
      eventHandlers:
        - event: AddrChanged(indexed bytes32,address)
          handler: handleAddrChanged
        - event: NameChanged(indexed bytes32,string)
          handler: handleNameChanged
      file: ./src/resolver.ts

  # ── Registry ────────────────────────────────────────────────────────────────
  - kind: ethereum
    name: Registry
    network: arc-testnet
    source:
      address: "0x3731b7c9F1830aD2880020DfcB0A4714E7fc252a"
      abi: Registry
      startBlock: 38332349
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Domain
      abis:
        - name: Registry
          file: ./abis/ArcNSRegistry.json
      eventHandlers:
        - event: Transfer(indexed bytes32,address)
          handler: handleTransfer
        - event: NewResolver(indexed bytes32,address)
          handler: handleNewResolver
      file: ./src/registry.ts

  # ── Reverse Registrar ───────────────────────────────────────────────────────
  - kind: ethereum
    name: ReverseRegistrar
    network: arc-testnet
    source:
      address: "0x97DEf95ADE4b67cD877725282d872d1eD2b4D489"
      abi: ReverseRegistrar
      startBlock: 38332349
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Domain
      abis:
        - name: ReverseRegistrar
          file: ./abis/ArcNSReverseRegistrar.json
      eventHandlers:
        - event: ReverseClaimed(indexed address,indexed bytes32)
          handler: handleReverseClaimed
      file: ./src/reverseRegistrar.ts
